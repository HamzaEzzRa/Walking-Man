name: Publish Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v3
        with:
          msbuild-architecture: x64

      - name: Build
        run: msbuild DllWrapper.sln /m /p:Configuration=Release /p:Platform=x64 /p:PostBuildEventUseInBuild=false

      - name: Stage Release Files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist | Out-Null
          Copy-Item x64\Release\dxgi.dll dist\dxgi.dll
          Copy-Item extended_wardrobe.ini dist\extended_wardrobe.ini

      - name: Create ZIP Archive
        shell: pwsh
        run: Compress-Archive -Path dist\* -DestinationPath walkingman_${{ github.ref_name }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: walkingman_${{ github.ref_name }}.zip
          fail_on_unmatched_files: true
